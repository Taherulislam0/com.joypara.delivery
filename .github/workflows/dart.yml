name: Build JoyPara Delivery App

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release APK/AAB/ZIP
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4️⃣ Fetch dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 5️⃣ Replace App Name, Package Name & Base URL
      - name: Replace App Name, Package Name & Base URL
        run: |
          # Dart files
          find lib/ -type f -name "*.dart" -exec sed -i 's/6Valley Delivery/JoyPara Delivery/g' {} +
          find lib/ -type f -name "*.dart" -exec sed -i 's|https://your_domain.com|https://www.joyparabd.com|g' {} +

          # AndroidManifest.xml
          sed -i 's/android:label="6valley delivery"/android:label="JoyPara Delivery"/g' android/app/src/main/AndroidManifest.xml
          sed -i 's/package="com.sixamtech.delivery"/package="com.joypara.delivery"/g' android/app/src/main/AndroidManifest.xml

          # Replace package name in Kotlin files
          find android/ -type f -name "*.kt" -exec sed -i 's/com.sixamtech.delivery/com.joypara.delivery/g' {} +

      # 6️⃣ Build APK
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # 7️⃣ Build AAB
      - name: Build AAB
        run: flutter build appbundle --release

      # 8️⃣ Create ZIP of the project (optional)
      - name: Create ZIP
        run: zip -r build/joypara_delivery.zip . -x "*.git*"

      # 9️⃣ Push to GitHub Release
      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            build/app/outputs/apk/release/*.apk
            build/app/outputs/bundle/release/*.aab
            build/joypara_delivery.zip
          tag: v1.0.0
          token: ${{ secrets.TOKEN }}
