name: JoyPara Delivery Source Zip

on:
  push:
    branches:
      - main

jobs:
  replace-and-zip:
    name: Replace & Zip Source Code
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3️⃣ Get dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      # 4️⃣ Replace old package & app name
      - name: Replace old package & app name
        run: |
          # Replace package name in AndroidManifest
          find android/app/src/main -type f -name "*.xml" -exec sed -i 's/com.sixamtech.delivery/com.joypara.delivery/g' {} +

          # Replace app label
          find android/app/src/main -type f -name "*.xml" -exec sed -i 's/6valley delivery/JoyPara Delivery/g' {} +

          # Replace package name in Dart files (imports)
          find lib/ -type f -name "*.dart" -exec sed -i 's/com.sixamtech.delivery/com.joypara.delivery/g' {} +

      # 5️⃣ Create ZIP of entire project (excluding build and git)
      - name: Zip Project
        run: |
          zip -r joypara_source_code.zip . -x "build/*" -x ".git/*" -x ".github/*"

      # 6️⃣ Upload ZIP as artifact
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v3
        with:
          name: joypara_source_code
          path: joypara_source_code.zip
