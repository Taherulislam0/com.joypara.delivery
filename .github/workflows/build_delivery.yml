name: Build JoyPara Delivery Zip Only

on:
  push:
    branches:
      - main

jobs:
  zip:
    name: Zip Flutter Project
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Java (optional, Flutter requires it for some tasks)
      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # 3️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 4️⃣ Get Flutter dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 5️⃣ Create ZIP of the entire project
      - name: Create project ZIP
        run: zip -r joypara_project.zip . -x "build/*" -x ".git/*"

      # 6️⃣ Upload ZIP as artifact
      - name: Upload ZIP
        uses: actions/upload-artifact@v3
        with:
          name: joypara_project
          path: joypara_project.zip
