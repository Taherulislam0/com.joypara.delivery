name: Build JoyPara Delivery App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Replace App Name
        run: |
          sed -i 's/6Valley Delivery/JoyPara Delivery/g' android/app/src/main/AndroidManifest.xml

      - name: Replace Package Name
        run: |
          find android/ -type f -exec sed -i 's/com.sixamtech.delivery/com.joypara.delivery/g' {} +

      - name: Replace Base URL
        run: |
          find lib/ -type f -name "*.dart" -exec sed -i 's|https://your_domain.com|https://joyparabd.com|g' {} +

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Create ZIP
        run: |
          mkdir -p build_zip
          cp build/app/outputs/apk/release/*.apk build_zip/
          cp build/app/outputs/bundle/release/*.aab build_zip/
          zip -r build_zip/JoyParaDelivery.zip build_zip/*

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            build/app/outputs/apk/release/*.apk
            build/app/outputs/bundle/release/*.aab
            build_zip/JoyParaDelivery.zip
          tag: v1.0.0
          token: ${{ secrets.TOKEN }}
